name: Notifier arsenal (nouveau contenu)
# A chaque push de contenu, on envoie un "repository_dispatch" au repo arsenal
# qui declenche le build de l'image et son push sur GHCR.
on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Declencher le build sur arsenal
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository_owner }}/arsenal/dispatches \
            -d '{"event_type":"content-updated"}'
